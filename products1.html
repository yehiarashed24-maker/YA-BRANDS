<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products - yehiaamin brands</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
}

/* Title */
h1 {
    text-align: center;
    margin-top: 20px;
}

/* Filter Buttons */
.filters {
    text-align: center;
    margin: 20px;
}

.filters button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}

/* Products */
.products {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    flex-wrap: wrap;
    justify-content: flex-start;
    gap: 20px;
    
}

/* Card */
.card {
    background: white;
    width: 220px;
    text-align: center;
    padding: 10px;
    transition: 0.3s;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* Hover */
.card:hover {
    transform: scale(1.1);
}

/* Button */
.card button {
    padding: 8px 15px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}

/* Back link */
.back {
    text-align: center;
    margin: 20px;
}
</style>

</head>

<body>

<h1>Our Products 🔥</h1>

<!-- Filter -->
<div class="filters">
    <button onclick="filterProducts('all')">All</button>
    <button onclick="filterProducts('shoes')">Shoes</button>

</div>

<!-- JavaScript -->
<script>
function filterProducts(brand) {
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        if (brand === "all" || card.dataset.brand === brand) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
}
</script>
