<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products - yehiaamin brands</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
}



h1 {
    text-align: center;
    margin-top: 20px;
}


.filters {
    text-align: center;
    margin: 20px;
}

.filters button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}


.products {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    padding: 20px;
}


.card {
    background: white;
    width: 220px;
    text-align: center;
    padding: 10px;
    transition: 0.3s;
}

.card img {
    width: 100%;
}


.card:hover {
    transform: scale(1.1);
}


.card button {
    padding: 8px 15px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}

.back {
    text-align: center;
    margin: 20px;
}
.old-price{
text-decoration:line-through;
color:rgb(200, 0, 0);
font-size:18px;
margin:5px 0;
}

.new-price{
color:rgb(0, 0, 0);
font-size:24px;
font-weight:bold;
margin:5px 0;
}

.sale{
background:red;
color:white;
padding:5px 10px;
border-radius:8px;
font-size:14px;
font-weight:bold;
display:inline-block;
margin-bottom:10px;
}
</style>

</head>

<body>

<h1>SALE Products 💸</h1>


<div class="filters">
    <button onclick="filterProducts('all')">All</button>
    <button onclick="filterProducts('men')">Men</button>

</div>


<div class="products">

<p class="new-price">3500 EGP</p>

<span class="sale">30% OFF</span>

<p class="new-price">3500 EGP</p>

<button>

 </div>

</div>


<div class="back">
    <a href="index.html">⬅ Back to Home</a>
</div>


<script>
function filterProducts(brand) {
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        if (brand === "all" || card.dataset.brand === brand) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
}
</script>

</body>
