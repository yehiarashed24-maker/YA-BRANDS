<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<title>YA BRANDS</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#loader h1{
color:white;
font-size:60px;
letter-spacing:5px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
opacity:0.5;
}

50%{
transform:scale(1.1);
opacity:1;
}

100%{
transform:scale(1);
opacity:0.5;
}

}


nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: black;
    color: white;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;

}


.hero {
   height: 140vh;
    background: url("photos/photo17.jpeg") center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
}

.hero h1 {
    font-size: 60px;
}

.hero button {
    padding: 12px 30px;
    background: white;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.hero button:hover {
    background: black;
    color: white;
}

.search-box{
text-align:center;
margin:40px;
}




.products {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
    padding: 40px;
}

.card {
    width: 220px;
    text-align: center;
    transition: 0.3s;
}

.card img {
    width: 100%;
}


.card:hover {
    transform: scale(1.1);
}
.card button {
    padding: 8px 15px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}


footer {
    background: black;
    color: white;
    text-align: center;
    padding: 20px;
}
@media (max-width: 768px) {

nav{
flex-direction: column;
align-items: center;
padding: 20px;
}

.nav-right{
display: flex;
flex-direction: column;
align-items: center;
}

.links{
display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 15px;
margin-top: 20px;
}

.links a{
margin: 0;
font-size: 18px;
}

.search-box{
margin: 15px 0;
}

.search-box input{
width: 250px;
}

.hero{
height: 70vh;
background-position: center;
}

.hero h1{
font-size: 35px;
}

.products{
padding: 20px;
}

.card{
width: 90%;
max-width: 300px;
}

}
@media (max-width:768px){

#loader h1{
font-size:35px;
text-align:center;
}

}



</style>

</head>

<body>
<div id="loader">

<h1>YA BRANDS</h1>


</div>

<nav>

<h2>YA Brands</h2>

<div class="nav-right">

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search Products...">

<button onclick="searchProduct()">
🔍
</button>

</div>

<div class="links">

<a href="index.html">Home</a>
<a href="shopnow.html">Shop</a>
<a href="contact.html">Contact</a>
<a href="about.html">About Us</a>
<a href ="QA.html">Q&A</a>

</div>

</div>

</nav>


<div class="hero">
    <div>
   
        <a href="shopnow.html"><button>Shop Now</button></a>
            

    </div>
</div>



</div>
<div class="products">

    <div class="card">
        <a href="products1.html">View Products</a>
        <img src="photos/photo14.jpeg">
        <h3><b>Mens</b></h3>
    </div>

    <div class="card">
        <a href="products2.html">View Products</a>
        <img src="photos/photo15.jpeg">
        <h3><b>Womens</b></h3>
    </div>

    <div class="card">
        <a href="products3.html">View Products</a>
        <img src="photos/photo16.jpeg">
        <h3><b>Kids</b></h3>

    </div>
    <div class="card">
        <a href="sale.html">View Products</a>
        <img src="photos/photo19.jpeg">
        <h3><b>Sale</b></h3>

</div>
</div>


<footer>
   
    <a href="copyright.html" style="color:white; text-decoration:none;">©Copyright Info</a>
</footer>
<script>

function searchProduct(){

let value =
document.getElementById("searchInput")
.value.toLowerCase().trim();



if(
value === "men" ||
value === "mens" ||
value === "hoodie" ||
value === "jacket" ||
value === "shoes"
){

window.location.href = "products1.html";

}



else if(
value === "women" ||
value === "womens" ||
value === "dress"
){

window.location.href = "products2.html";

}



else if(
value === "kids" ||
value === "kid" ||
value === "baby"
){

window.location.href = "products3.html";

}

else{

alert("No Products Found");

}

}

</script>

<script>

window.onload = function(){

setTimeout(function(){

document.getElementById("loader")
.style.opacity = "0";

setTimeout(function(){

document.getElementById("loader")
.style.display = "none";

}, 500);

}, 1500);

};

</script>




</body>
</html>
